name: 🚀 QuantAgri Daily Notes

on:
  schedule:
    # EST → UTC: +5 hours
    - cron: '0 16 * * *'  # 11am EST: SOY
    - cron: '0 17 * * *'  # 12pm EST: COTTON  
    - cron: '0 18 * * *'  # 1pm EST: CORN
    - cron: '0 19 * * *'  # 2pm EST: WHEAT
    - cron: '0 20 * * *'  # 3pm EST: SUGAR
  workflow_dispatch:  # Manual trigger dropdown

jobs:
  soy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: 📤 Broadcast Soy Note
        run: python broadcast.py soy
        env:
          API_KEY: ${{ secrets.API_KEY }}

  cotton:
